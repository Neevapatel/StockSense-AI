{% extends "base.html" %}
{% block content %}
<style>
    .auth-input {
        width: 100%;
        padding: 9px 12px 9px 36px;
        border: 1.5px solid #dde3f0;
        border-radius: 8px;
        font-size: 0.875rem;
        color: #1e293b;
        outline: none;
        box-sizing: border-box;
        background: #f8faff;
        transition: border-color 0.2s, background 0.2s;
    }

    .auth-input:focus {
        border-color: #2563eb;
        background: #fff;
    }

    .auth-btn {
        width: 100%;
        padding: 10px;
        background: #1e3a5f;
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
        letter-spacing: 0.01em;
    }

    .auth-btn:hover {
        background: white;
        color: #1e3a5f;
        border: 1px solid #1e293b;
    }

    .panel-right {
        background: #1e3a5f;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.75rem;
        min-width: 260px;
    }
</style>

<div style="display:flex; align-items:center; justify-content:center; min-height: calc(100vh - 120px); padding:1rem;">
    <div
        style="display:flex; width:100%; max-width:820px; border-radius:20px; overflow:hidden; box-shadow:0 12px 40px rgba(37,99,235,0.18);">

        <div
            style="flex:1; background:#fff; padding:1.75rem 2rem; display:flex; flex-direction:column; justify-content:center;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:1.5rem;">
                <div
                    style="width:32px; height:32px; background:#1e3a5f; border-radius:8px; display:flex; align-items:center; justify-content:center;">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
                        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" stroke="white" stroke-width="2.2"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <polyline points="16 7 22 7 22 13" stroke="white" stroke-width="2.2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>
                <span style="font-size:0.95rem; font-weight:700; color:#1e3a5f; letter-spacing:0.01em;">StockSense
                    AI</span>
            </div>

            <h2 style="font-size:1.4rem; font-weight:700; color:#1e293b; margin:0 0 0.25rem;">Welcome back</h2>
            <p style="font-size:0.82rem; color:#64748b; margin:0 0 1.25rem;">Sign in to your prediction dashboard</p>

            <form method="POST">
                <div style="margin-bottom:1rem;">
                    <label
                        style="display:block; font-size:0.75rem; font-weight:600; color:#374151; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em;">Email</label>
                    <div style="position:relative;">
                        <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%);">
                            <svg width="15" height="15" fill="none" viewBox="0 0 24 24">
                                <path
                                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                                    stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </span>
                        <input type="email" name="email" placeholder="you@example.com" class="auth-input" required>
                    </div>
                </div>

                <div style="margin-bottom:0.75rem;">
                    <label
                        style="display:block; font-size:0.75rem; font-weight:600; color:#374151; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em;">Password</label>
                    <div style="position:relative;">
                        <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%);">
                            <svg width="15" height="15" fill="none" viewBox="0 0 24 24">
                                <path
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                                    stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </span>
                        <input type="password" name="password" placeholder="••••••••" class="auth-input" required>
                    </div>
                </div>

                <label
                    style="display:flex; align-items:center; gap:7px; font-size:0.8rem; color:#64748b; margin-bottom:1.1rem; cursor:pointer;">
                    <input type="checkbox" name="remember" style="accent-color:#2563eb; width:14px; height:14px;">
                    Keep me signed in
                </label>

                <button type="submit" class="auth-btn">Sign in →</button>
            </form>

            <p style="text-align:center; font-size:0.8rem; color:#64748b; margin-top:1rem;">
                New user? <a href="{{ url_for('register') }}"
                    style="color:#2563eb; font-weight:600; text-decoration:none;">Create account</a>
            </p>
        </div>

        <div class="panel-right">
            <div
                style="position:absolute; top:-40px; right:-40px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,0.04);">
            </div>
            <div
                style="position:absolute; bottom:-30px; left:-30px; width:130px; height:130px; border-radius:50%; background:rgba(255,255,255,0.04);">
            </div>

            <svg width="220" height="160" viewBox="0 0 220 160" fill="none" xmlns="http://www.w3.org/2000/svg"
                style="margin-bottom:1.25rem;">
                <rect x="20" y="20" width="180" height="110" rx="10" fill="#162d4a" stroke="#2563eb"
                    stroke-width="1.5" />
                <rect x="30" y="30" width="160" height="90" rx="6" fill="#0f1f35" />
                <rect x="95" y="130" width="30" height="8" rx="3" fill="#1e3a5f" />
                <rect x="80" y="138" width="60" height="5" rx="2.5" fill="#1e3a5f" />
                <line x1="40" y1="95" x2="180" y2="95" stroke="#1e3a5f" stroke-width="1" />
                <line x1="40" y1="80" x2="180" y2="80" stroke="#1e3a5f" stroke-width="1" />
                <line x1="40" y1="65" x2="180" y2="65" stroke="#1e3a5f" stroke-width="1" />
                <line x1="40" y1="50" x2="180" y2="50" stroke="#1e3a5f" stroke-width="1" />
                <polyline points="45,92 65,85 80,88 100,70 115,72 130,58 148,55 165,42 178,38" stroke="#3b82f6"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                <polygon points="45,92 65,85 80,88 100,70 115,72 130,58 148,55 165,42 178,38 178,110 45,110"
                    fill="url(#bluegrad)" opacity="0.25" />
                <defs>
                    <linearGradient id="bluegrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#3b82f6" />
                        <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
                    </linearGradient>
                </defs>
                <circle cx="178" cy="38" r="5" fill="#60a5fa" />
                <circle cx="178" cy="38" r="9" fill="#60a5fa" opacity="0.2" />
                <rect x="150" y="62" width="5" height="12" rx="1" fill="#22c55e" />
                <line x1="152.5" y1="60" x2="152.5" y2="76" stroke="#22c55e" stroke-width="1.2" />
                <rect x="160" y="58" width="5" height="10" rx="1" fill="#22c55e" />
                <line x1="162.5" y1="56" x2="162.5" y2="70" stroke="#22c55e" stroke-width="1.2" />
                <rect x="170" y="48" width="5" height="8" rx="1" fill="#22c55e" />
                <line x1="172.5" y1="46" x2="172.5" y2="58" stroke="#22c55e" stroke-width="1.2" />
                <rect x="42" y="33" width="36" height="14" rx="4" fill="#1d4ed8" opacity="0.9" />
                <text x="60" y="43" text-anchor="middle" font-size="8" fill="white" font-family="sans-serif"
                    font-weight="600">AI Pred</text>
                <text x="44" y="116" font-size="7" fill="#3b82f6" font-family="monospace">AAPL</text>
                <text x="80" y="116" font-size="7" fill="#60a5fa" font-family="monospace">TSLA</text>
                <text x="116" y="116" font-size="7" fill="#93c5fd" font-family="monospace">NVDA</text>
                <text x="152" y="116" font-size="7" fill="#22c55e" font-family="monospace">+2.4%</text>
            </svg>

            <div style="display:flex; gap:12px; margin-bottom:1rem;">
                <div style="background:rgba(255,255,255,0.07); border-radius:8px; padding:8px 12px; text-align:center;">
                    <div style="color:#60a5fa; font-size:0.95rem; font-weight:700;">94.2%</div>
                    <div style="color:rgba(255,255,255,0.5); font-size:0.65rem; margin-top:2px;">Accuracy</div>
                </div>
                <div style="background:rgba(255,255,255,0.07); border-radius:8px; padding:8px 12px; text-align:center;">
                    <div style="color:#22c55e; font-size:0.95rem; font-weight:700;">+18.3%</div>
                    <div style="color:rgba(255,255,255,0.5); font-size:0.65rem; margin-top:2px;">Avg Return</div>
                </div>
                <div style="background:rgba(255,255,255,0.07); border-radius:8px; padding:8px 12px; text-align:center;">
                    <div style="color:#a78bfa; font-size:0.95rem; font-weight:700;">50+</div>
                    <div style="color:rgba(255,255,255,0.5); font-size:0.65rem; margin-top:2px;">Stocks</div>
                </div>
            </div>

            <p
                style="color:rgba(255,255,255,0.6); font-size:0.75rem; text-align:center; line-height:1.5; margin:0; max-width:200px;">
                AI-powered predictions for smarter investing decisions</p>
        </div>

    </div>
</div>
{% endblock %}
