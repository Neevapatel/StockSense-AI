{% extends "base.html" %}
{% block content %}
<style>
  .prof-input { width:100%; padding:9px 12px; border:1.5px solid #dde3f0; border-radius:8px; font-size:0.875rem; color:#1e293b; outline:none; box-sizing:border-box; background:#f8faff; transition:border-color 0.2s, background 0.2s; }
  .prof-input:focus { border-color:#2563eb; background:#fff; }
  .save-btn { flex:1; padding:10px; background:#1e3a5f; color:#fff; font-size:0.9rem; font-weight:600; border:none; border-radius:8px; cursor:pointer; transition:background 0.2s; text-align:center; }
  .save-btn:hover { background:white; color: #1e3a5f; border: 1px solid #1e293b; }
  .cancel-btn { flex:1; padding:10px; background:#f1f5f9; color:#475569; font-size:0.9rem; font-weight:600; border:none; border-radius:8px; cursor:pointer; transition:background 0.2s; text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center; }
  .cancel-btn:hover { background:#e2e8f0; }
</style>

<div style="display:flex; align-items:center; justify-content:center; min-height: calc(100vh - 120px); padding:0.5rem;">
  <div style="display:flex; width:100%; max-width:820px; border-radius:20px; overflow:hidden; box-shadow:0 12px 40px rgba(37,99,235,0.18);">

    <div style="background:#1e3a5f; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.75rem; min-width:260px;">
      <div style="position:absolute; top:-40px; right:-40px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,0.04);"></div>
      <div style="position:absolute; bottom:-30px; left:-30px; width:130px; height:130px; border-radius:50%; background:rgba(255,255,255,0.04);"></div>

      <div style="width:72px; height:72px; background:#2563eb; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.75rem; font-weight:700; color:white; margin-bottom:0.85rem; border:3px solid rgba(255,255,255,0.15); position:relative; z-index:1;">
        {{ user.full_name[0] | upper }}
      </div>
      <div style="color:white; font-size:1rem; font-weight:700; margin-bottom:0.2rem; position:relative; z-index:1;">{{ user.full_name }}</div>
      <div style="color:rgba(255,255,255,0.5); font-size:0.75rem; margin-bottom:1.5rem; position:relative; z-index:1;">{{ user.email }}</div>

      <div style="background:rgba(37,99,235,0.25); border:1px solid rgba(37,99,235,0.4); border-radius:20px; padding:4px 14px; font-size:0.7rem; font-weight:600; color:#93c5fd; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:1.75rem; position:relative; z-index:1;">
        {{ user.role }}
      </div>

      <div style="width:100%; position:relative; z-index:1;">
        <div style="background:rgba(255,255,255,0.06); border-radius:10px; padding:10px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px;">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div>
            <div style="color:rgba(255,255,255,0.45); font-size:0.63rem; text-transform:uppercase; letter-spacing:0.05em;">Security</div>
            <div style="color:rgba(255,255,255,0.85); font-size:0.78rem;">Password protected</div>
          </div>
        </div>
        <div style="background:rgba(255,255,255,0.06); border-radius:10px; padding:10px 14px; display:flex; align-items:center; gap:10px;">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div>
            <div style="color:rgba(255,255,255,0.45); font-size:0.63rem; text-transform:uppercase; letter-spacing:0.05em;">Access</div>
            <div style="color:rgba(255,255,255,0.85); font-size:0.78rem;">StockSense AI</div>
          </div>
        </div>
      </div>
    </div>

    <div style="flex:1; background:#fff; padding:1.75rem 2rem; display:flex; flex-direction:column; justify-content:center;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:1.4rem;">
        <div style="width:32px; height:32px; background:#1e3a5f; border-radius:8px; display:flex; align-items:center; justify-content:center;">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <div style="font-size:1.2rem; font-weight:700; color:#1e293b; line-height:1.2;">Account Settings</div>
          <div style="font-size:0.75rem; color:#64748b;">Manage your personal information and security</div>
        </div>
      </div>

      <form method="POST" style="display:flex; flex-direction:column; gap:0.85rem;">

        <div>
          <label style="display:block; font-size:0.75rem; font-weight:600; color:#374151; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em;">Full Name</label>
          <div style="position:relative;">
            <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%);">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input type="text" name="fullname" value="{{ user.full_name }}" class="prof-input" style="padding-left:36px;" required>
          </div>
        </div>

        <div>
          <label style="display:block; font-size:0.75rem; font-weight:600; color:#374151; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em;">Email Address</label>
          <div style="position:relative;">
            <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%);">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input type="email" name="email" value="{{ user.email }}" class="prof-input" style="padding-left:36px;" required>
          </div>
        </div>

        <div style="border-top:1px solid #f1f5f9; padding-top:0.85rem;">
          <label style="display:block; font-size:0.75rem; font-weight:600; color:#374151; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em;">New Password <span style="color:#94a3b8; font-weight:400; text-transform:none; letter-spacing:0;">(leave blank to keep current)</span></label>
          <div style="position:relative;">
            <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%);">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input type="password" name="password" placeholder="••••••••" class="prof-input" style="padding-left:36px;">
          </div>
        </div>

        <div style="display:flex; gap:10px; padding-top:0.5rem;">
          <button type="submit" class="save-btn">Save Changes</button>
          <a href="{{ url_for('admin' if user.role == 'ADMIN' else 'dashboard') }}" class="cancel-btn">Cancel</a>
        </div>

      </form>
    </div>

  </div>
</div>
{% endblock %}
