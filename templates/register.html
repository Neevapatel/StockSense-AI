{% extends "base.html" %}
{% block content %}
<style>
  .auth-input { width:100%; padding:9px 12px 9px 36px; border:1.5px solid #dde3f0; border-radius:8px; font-size:0.875rem; color:#1e293b; outline:none; box-sizing:border-box; background:#f8faff; transition:border-color 0.2s, background 0.2s; }
  .auth-input:focus { border-color:#2563eb; background:#fff; }
  .auth-btn { width:100%; padding:10px; background:#1e3a5f; color:#fff; font-size:0.9rem; font-weight:600; border:none; border-radius:8px; cursor:pointer; transition:background 0.2s; }
  .auth-btn:hover { background:white; color: #1e3a5f; border: 1px solid #1e293b; }
  .panel-right { background:#1e3a5f; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.75rem; min-width:260px; }
</style>

<div style="display:flex; align-items:center; justify-content:center; min-height: calc(100vh - 120px); padding:1rem;">
  <div style="display:flex; width:100%; max-width:820px; border-radius:20px; overflow:hidden; box-shadow:0 12px 40px rgba(37,99,235,0.18);">

    <div style="flex:1; background:#fff; padding:1.5rem 2rem; display:flex; flex-direction:column; justify-content:center;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:1.25rem;">
        <div style="width:32px; height:32px; background:#1e3a5f; border-radius:8px; display:flex; align-items:center; justify-content:center;">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="16 7 22 7 22 13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span style="font-size:0.95rem; font-weight:700; color:#1e3a5f;">StockSense AI</span>
      </div>

      <h2 style="font-size:1.4rem; font-weight:700; color:#1e293b; margin:0 0 0.2rem;">Create your account</h2>
      <p style="font-size:0.82rem; color:#64748b; margin:0 0 1.1rem;">Start predicting smarter today — free forever</p>

      <form method="POST">
        <div style="margin-bottom:0.85rem;">
          <label style="display:block; font-size:0.75rem; font-weight:600; color:#374151; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em;">Full name</label>
          <div style="position:relative;">
            <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%);">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input type="text" name="fullname" placeholder="John Smith" class="auth-input" required>
          </div>
        </div>

        <div style="margin-bottom:0.85rem;">
          <label style="display:block; font-size:0.75rem; font-weight:600; color:#374151; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em;">Email</label>
          <div style="position:relative;">
            <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%);">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input type="email" name="email" placeholder="you@example.com" class="auth-input" required>
          </div>
        </div>

        <div style="margin-bottom:1.1rem;">
          <label style="display:block; font-size:0.75rem; font-weight:600; color:#374151; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em;">Password</label>
          <div style="position:relative;">
            <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%);">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input type="password" name="password" placeholder="Min. 8 characters" class="auth-input" required>
          </div>
        </div>

        <button type="submit" class="auth-btn">Create account →</button>
      </form>

      <p style="text-align:center; font-size:0.8rem; color:#64748b; margin-top:1rem;">
        Already have an account? <a href="/login" style="color:#2563eb; font-weight:600; text-decoration:none;">Sign in</a>
      </p>
    </div>

    <div class="panel-right">
      <div style="position:absolute; top:-40px; right:-40px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,0.04);"></div>
      <div style="position:absolute; bottom:-30px; left:-30px; width:130px; height:130px; border-radius:50%; background:rgba(255,255,255,0.04);"></div>

      <svg width="210" height="155" viewBox="0 0 210 155" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:1.25rem;">
        <circle cx="105" cy="70" r="38" fill="#162d4a" stroke="#2563eb" stroke-width="1.5"/>
        <circle cx="105" cy="70" r="28" fill="#0f1f35"/>
        <circle cx="105" cy="70" r="4" fill="#3b82f6"/>
        <circle cx="92" cy="60" r="3" fill="#60a5fa"/>
        <circle cx="118" cy="60" r="3" fill="#60a5fa"/>
        <circle cx="88" cy="78" r="3" fill="#93c5fd"/>
        <circle cx="122" cy="78" r="3" fill="#93c5fd"/>
        <circle cx="100" cy="85" r="3" fill="#60a5fa"/>
        <circle cx="112" cy="85" r="3" fill="#60a5fa"/>
        <line x1="105" y1="70" x2="92" y2="60" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
        <line x1="105" y1="70" x2="118" y2="60" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
        <line x1="105" y1="70" x2="88" y2="78" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
        <line x1="105" y1="70" x2="122" y2="78" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
        <line x1="105" y1="70" x2="100" y2="85" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
        <line x1="105" y1="70" x2="112" y2="85" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
        <line x1="92" y1="60" x2="88" y2="78" stroke="#1d4ed8" stroke-width="0.8" opacity="0.5"/>
        <line x1="118" y1="60" x2="122" y2="78" stroke="#1d4ed8" stroke-width="0.8" opacity="0.5"/>
        <rect x="15" y="55" width="50" height="18" rx="9" fill="#1d4ed8" opacity="0.9"/>
        <text x="40" y="67" text-anchor="middle" font-size="8" fill="white" font-family="monospace" font-weight="600">AAPL ↑</text>
        <rect x="145" y="40" width="52" height="18" rx="9" fill="#065f46" opacity="0.9"/>
        <text x="171" y="52" text-anchor="middle" font-size="8" fill="#6ee7b7" font-family="monospace" font-weight="600">NVDA +4%</text>
        <rect x="148" y="90" width="50" height="18" rx="9" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
        <text x="173" y="102" text-anchor="middle" font-size="8" fill="#93c5fd" font-family="monospace">TSLA →</text>
        <rect x="12" y="88" width="52" height="18" rx="9" fill="#4c1d95" opacity="0.85"/>
        <text x="38" y="100" text-anchor="middle" font-size="8" fill="#c4b5fd" font-family="monospace">MSFT +2%</text>
        <line x1="67" y1="64" x2="90" y2="68" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>
        <line x1="145" y1="49" x2="131" y2="62" stroke="#22c55e" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>
        <line x1="148" y1="99" x2="131" y2="78" stroke="#60a5fa" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>
        <line x1="64" y1="97" x2="88" y2="78" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>
        <polyline points="30,140 50,130 70,133 90,118 110,120 130,108 150,104 170,96 185,92" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="185" cy="92" r="4" fill="#60a5fa"/>
        <circle cx="185" cy="92" r="7" fill="#60a5fa" opacity="0.2"/>
      </svg>

      <div style="display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:1rem;">
        <span style="background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.3); color:#93c5fd; font-size:0.68rem; padding:4px 9px; border-radius:20px;">LSTM Model</span>
        <span style="background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.25); color:#86efac; font-size:0.68rem; padding:4px 9px; border-radius:20px;">Real-time Data</span>
        <span style="background:rgba(167,139,250,0.1); border:1px solid rgba(167,139,250,0.25); color:#c4b5fd; font-size:0.68rem; padding:4px 9px; border-radius:20px;">50+ Stocks</span>
      </div>

      <p style="color:rgba(255,255,255,0.55); font-size:0.73rem; text-align:center; line-height:1.5; margin:0; max-width:195px;">Join thousands using AI to predict market movements with confidence</p>
    </div>

  </div>
</div>
{% endblock %}
